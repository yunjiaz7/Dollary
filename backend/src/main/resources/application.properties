spring.application.name=billingbook

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/billingbook
spring.datasource.username=billingbook
spring.datasource.password=billingbook
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Session
server.servlet.session.timeout=7d

# Auth credentials (override via env vars in production)
app.username=${APP_USERNAME:admin}
app.password=${APP_PASSWORD:admin123}
